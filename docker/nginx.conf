worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream phantom_backend {
        server backend:3001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Frontend static files
        root /var/www/phantom;
        index index.html;

        # IMPORTANT: proxy all /api and /socket.io to backend
        # Frontend static served by nginx directly

        location /api/ {
            proxy_pass          http://phantom_backend;
            proxy_http_version  1.1;

            # These are critical for session cookies
            proxy_set_header    Host                $http_host;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto   $scheme;
            proxy_set_header    Cookie              $http_cookie;

            # Do NOT buffer - pass cookies through immediately
            proxy_buffering     off;
            proxy_pass_header   Set-Cookie;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }

        location /socket.io/ {
            proxy_pass          http://phantom_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade             $http_upgrade;
            proxy_set_header    Connection          "upgrade";
            proxy_set_header    Host                $http_host;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    Cookie              $http_cookie;
            proxy_pass_header   Set-Cookie;
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\. { deny all; }
    }
}